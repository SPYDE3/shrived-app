<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal — Shrived.</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="sidebar">
      <div class="sidebar-logo">
        <a href="index.html" class="nav-logo">
          <div class="nav-logo-icon">🕉</div>
          <span class="nav-logo-text">Shrived.</span>
        </a>
      </div>
      
      <div class="sidebar-user">
        <div class="sidebar-avatar" style="background: var(--saffron);">A</div>
        <div>
          <div style="font-weight: 600;" id="user-name-display">Admin Portal</div>
          <div style="font-size: 0.8rem; color: var(--text-muted);">Pandit Bibhupada Mishra</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active"><i class="fa-solid fa-list-check"></i> All Bookings</a>
        <a href="#" class="sidebar-link"><i class="fa-solid fa-users"></i> Customers</a>
        <a href="#" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Analytics</a>
      </nav>

      <div style="padding: 20px; margin-top: auto;">
        <button class="btn btn-outline w-100" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dashboard-header">
        <button class="btn btn-ghost hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display: block; margin-right: 16px;">
          <span></span><span></span><span></span>
        </button>
        <h2 class="heading-2">Manage Bookings 📿</h2>
        <div class="nav-actions">
          <button class="nav-btn-icon" data-theme-toggle>🌙</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
          <div class="stat-info">
            <h3 id="stat-pending">0</h3>
            <p>Pending Requests</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22c55e;"><i class="fa-solid fa-check-double"></i></div>
          <div class="stat-info">
            <h3 id="stat-confirmed">0</h3>
            <p>Confirmed Pujas</p>
          </div>
        </div>
      </div>

      <!-- Admin Bookings Table -->
      <div class="card-glass mt-8">
        <div class="flex-between mb-6">
          <h3 class="heading-3">All Customer Bookings</h3>
          <button class="btn btn-outline btn-sm" onclick="loadAdminBookings()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
        </div>
        
        <div style="overflow-x: auto;">
          <table class="data-table" id="admin-bookings-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Client Details</th>
                <th>Puja Service</th>
                <th>Schedule</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data injected via JS -->
            </tbody>
          </table>
          
          <div id="no-bookings" style="display: none; padding: 40px; text-align: center; color: var(--text-muted);">
            <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.5;"></i>
            <p>No bookings received yet.</p>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Security Check
      const userStr = localStorage.getItem('shrived_user');
      if(!userStr) {
        window.location.href = 'login.html';
        return;
      }
      const user = JSON.parse(userStr);
      if(user.role !== 'admin') {
        // Technically an admin check should happen on backend, but for UI:
        alert("Access Denied. You do not have admin privileges.");
        window.location.href = 'dashboard.html';
        return;
      }

      loadAdminBookings();
    });

    async function loadAdminBookings() {
      try {
        const response = await fetch('/api/bookings');
        const bookings = await response.json();
        const tbody = document.querySelector('#admin-bookings-table tbody');
        tbody.innerHTML = '';
        
        if (!bookings || bookings.length === 0) {
          document.getElementById('admin-bookings-table').style.display = 'none';
          document.getElementById('no-bookings').style.display = 'block';
        } else {
          document.getElementById('admin-bookings-table').style.display = 'table';
          document.getElementById('no-bookings').style.display = 'none';

          let pendingCount = 0;
          let confirmedCount = 0;
          
          bookings.forEach(b => {
            if(b.status === 'Pending') pendingCount++;
            if(b.status === 'Confirmed') confirmedCount++;

            const tr = document.createElement('tr');
            const displayId = 'BKG' + b._id.substring(b._id.length - 6).toUpperCase();
            
            tr.innerHTML = `
              <td><span style="font-family: monospace; font-size: 0.8rem; background: var(--surface); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);">${displayId}</span></td>
              <td>
                <div style="font-weight: 600;">${b.name}</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);"><i class="fa-solid fa-phone" style="font-size: 0.7rem;"></i> ${b.phone}</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary);"><i class="fa-solid fa-location-dot" style="font-size: 0.7rem;"></i> ${b.address}</div>
              </td>
              <td>
                <div style="font-weight: 600;">${b.service}</div>
                <div style="font-size: 0.8rem; color: var(--saffron);">${b.tradition} • Samagri: ${b.samagri}</div>
              </td>
              <td>
                <div><i class="fa-regular fa-calendar"></i> ${b.date}</div>
                <div style="font-size: 0.8rem;"><i class="fa-regular fa-clock"></i> ${b.time}</div>
              </td>
              <td>
                <select class="form-input" style="padding: 4px 8px; font-size: 0.8rem; border-radius: 4px;" onchange="updateStatus('${b._id}', this.value)">
                  <option value="Pending" ${b.status === 'Pending' ? 'selected' : ''}>Pending</option>
                  <option value="Confirmed" ${b.status === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                  <option value="Completed" ${b.status === 'Completed' ? 'selected' : ''}>Completed</option>
                  <option value="Cancelled" ${b.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                </select>
              </td>
              <td>
                <a href="https://wa.me/91${b.phone}?text=Hari%20Om%20${b.name}!%20Regarding%20your%20puja%20booking%20(${displayId})..." class="btn btn-outline btn-sm" target="_blank" style="padding: 4px 12px; font-size: 0.8rem;"><i class="fa-brands fa-whatsapp"></i> Chat</a>
              </td>
            `;
            tbody.appendChild(tr);
          });

          document.getElementById('stat-pending').textContent = pendingCount;
          document.getElementById('stat-confirmed').textContent = confirmedCount;
        }
      } catch(err) {
        console.error('Failed to load bookings:', err);
      }
    }

    async function updateStatus(bookingId, newStatus) {
      try {
        const res = await fetch(`/api/bookings/${bookingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        
        if(res.ok) {
          window.Shrived.Toast.show('Booking status updated!', 'success');
          loadAdminBookings(); // Refresh stats
        } else {
          window.Shrived.Toast.show('Failed to update status', 'error');
        }
      } catch (err) {
        window.Shrived.Toast.show('Network error updating status', 'error');
      }
    }
  </script>
</body>
</html>
