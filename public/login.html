<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up — Shrived.</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+Devanagari:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">🕉</div>
        <span class="nav-logo-text">Shrived.</span>
      </a>
      <div class="nav-actions">
        <button class="nav-btn-icon" data-theme-toggle>🌙</button>
      </div>
    </div>
  </nav>

  <section class="section flex-center" style="min-height: 100vh; padding-top: 80px;">
    <div class="container flex-center">
      
      <!-- Auth Container -->
      <div class="card-glass reveal" style="max-width: 450px; width: 100%; padding: 40px;">
        
        <div class="text-center mb-6">
          <div class="nav-logo-icon" style="font-size: 2.5rem; color: var(--saffron); margin-bottom: 8px;">🕉</div>
          <h2 class="heading-2" id="auth-title">Welcome Back</h2>
          <p class="text-secondary" id="auth-subtitle" style="font-size: 0.9rem;">Sign in to view your spiritual bookings.</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="login-email" class="form-input" required placeholder="devotee@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="login-password" class="form-input" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100" id="login-btn">Sign In</button>
          
          <div class="text-center mt-4" style="font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="#" onclick="toggleAuthMode(event)" style="color: var(--saffron); font-weight: 600;">Sign up here</a>
          </div>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="register-form" onsubmit="handleRegister(event)" style="display: none;">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="reg-name" class="form-input" required placeholder="Sri Ram">
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="reg-email" class="form-input" required placeholder="devotee@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="reg-password" class="form-input" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100" id="reg-btn">Create Account</button>
          
          <div class="text-center mt-4" style="font-size: 0.9rem; color: var(--text-secondary);">
            Already have an account? <a href="#" onclick="toggleAuthMode(event)" style="color: var(--saffron); font-weight: 600;">Sign in</a>
          </div>
        </form>

      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
